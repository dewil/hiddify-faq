site_name: Hiddify FAQ
site_description: Русскоязычный FAQ по установке, настройке и эксплуатации Hiddify VPN. Решения повторяющихся проблем из обсуждений сообщества.
site_url: https://dewil.github.io/hiddify-faq/
docs_dir: docs

theme:
  name: material
  language: ru
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Темная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ru
  - awesome-pages
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: "#"
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables

extra_javascript:
  - assets/js/external-links.js

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/hiddify_rus
      name: Русское сообщество Hiddify
