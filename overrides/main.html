{% extends "base.html" %}

{% block extrahead %}
  <meta name="yandex-verification" content="2e5ced21943118a8" />
  <meta name="google-site-verification" content="GNAqQIA56gV2X3UaWFwWVsmk2-OGh1q4MZiHLHKeJ4o" />

  {% if page %}
    {%- set og_title = page.meta.title | default(page.title) | default(config.site_name) -%}
    {%- set og_description = page.meta.description | default(config.site_description) -%}
    <meta property="og:site_name" content="{{ config.site_name }}" />
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:url" content="{{ page.canonical_url }}" />
    <meta property="og:type" content="article" />
    <meta property="og:locale" content="ru_RU" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
  {% endif %}
{% endblock %}
